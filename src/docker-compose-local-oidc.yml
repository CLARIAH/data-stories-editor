services:
  stories:
    image: data_stories
    build:
      context: .
    environment:
      - APP_DOMAIN=http://localhost
      - OIDC_SERVER=${OIDC_SERVER}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI}
    volumes:
      - ${DATA_LOCATION}:/app/service/data
    ports:
      - 80:80

